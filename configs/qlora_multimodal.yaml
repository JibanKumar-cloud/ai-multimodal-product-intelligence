model:
  name: "llava-hf/llava-1.5-7b-hf"
  quantization: "4bit"
  quantization_config:
    bnb_4bit_compute_dtype: "float16"
    bnb_4bit_use_double_quant: true
    bnb_4bit_quant_type: "nf4"
lora:
  r: 16
  alpha: 32
  dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"
  target_modules: ["q_proj","v_proj","k_proj","o_proj","gate_proj","up_proj","down_proj"]
training:
  output_dir: "outputs/checkpoints/qlora-multimodal"
  num_train_epochs: 2
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 32
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.03
  lr_scheduler_type: "cosine"
  max_grad_norm: 0.3
  fp16: true
  bf16: false
  logging_steps: 10
  eval_steps: 25
  save_steps: 50
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false
  seed: 42
data:
  dataset_path: "data/processed"
  train_file: "train_multimodal.jsonl"
  val_file: "val_multimodal.jsonl"
  test_file: "test_multimodal.jsonl"
  max_seq_length: 2048
  max_image_size: 336

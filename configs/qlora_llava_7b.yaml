# QLoRA Fine-tuning Configuration for LLaVA-1.5-7B
# Multimodal: trains on image+text (~3K) and text-only (~remaining) examples

model:
  name: "llava-hf/llava-1.5-7b-hf"
  quantization: "4bit"
  quantization_config:
    bnb_4bit_compute_dtype: "float16"
    bnb_4bit_use_double_quant: true
    bnb_4bit_quant_type: "nf4"

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"
  target_modules:
    - "q_proj"
    - "v_proj"
    - "k_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

training:
  output_dir: "outputs/checkpoints/qlora-llava-7b"
  num_train_epochs: 3
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 8        # Effective batch = 32
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.03
  lr_scheduler_type: "cosine"
  max_grad_norm: 0.3
  fp16: true
  bf16: false                           # Set true on A100/H100
  logging_steps: 10
  eval_steps: 100
  save_steps: 200
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false
  dataloader_num_workers: 4
  seed: 42
  report_to: "wandb"                    # or "none" to disable

data:
  dataset_path: "data/processed"
  train_file: "train.jsonl"
  val_file: "val.jsonl"
  test_file: "test.jsonl"
  max_seq_length: 2048
  max_image_size: 336                   # LLaVA native resolution
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
